<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nossa Grana</title>
    <meta name="theme-color" content="#0F1A2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/nossagrana/192/192" />
    <script>
      let startY = 0;
      document.addEventListener('touchstart', function(e) {
        startY = e.touches[0].pageY;
      }, {passive: false});
      
      document.addEventListener('touchmove', function(e) {
        let y = e.touches[0].pageY;
        let root = document.getElementById('root');
        // Prevent pull-to-refresh: if pulling down (y > startY) AND at the top (scrollTop <= 0)
        if (y > startY && root.scrollTop <= 0) {
          e.preventDefault();
        }
      }, {passive: false});
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
